name: Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run a single quick benchmark to test the pipeline'
        type: boolean
        default: true

concurrency:
  group: benchmark
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: debian-benchmark
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run benchmarks
        run: |
          dotnet run --project src/Quarry.Benchmarks -c Release \
            -- --filter '*' --artifacts BenchmarkDotNet.Artifacts
        env:
          BENCHMARK_DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Merge benchmark results
        run: |
          jq -s '{
            Title: "Quarry Benchmarks",
            HostEnvironmentInfo: .[0].HostEnvironmentInfo,
            Benchmarks: [.[].Benchmarks[] | select(.Statistics != null)]
          }' BenchmarkDotNet.Artifacts/results/*-report-full.json \
            > BenchmarkDotNet.Artifacts/combined-results.json

      - name: Clone benchmark store
        run: |
          git clone --branch gh-pages \
            "https://x-access-token:${TOKEN}@github.com/Dtronix/Quarry-benchmarks.git" \
            benchmark-store 2>/dev/null || {
            mkdir benchmark-store
            cd benchmark-store
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${TOKEN}@github.com/Dtronix/Quarry-benchmarks.git"
          }
          mkdir -p benchmark-store/dev/bench
        env:
          TOKEN: ${{ secrets.BENCHMARK_TOKEN }}

      - name: Create synthetic push event for benchmark action
        run: |
          COMMIT_SHA="${WORKFLOW_RUN_SHA:-$GITHUB_SHA}"
          COMMIT_MSG=$(git log -1 --format='%s' HEAD)
          COMMIT_AUTHOR=$(git log -1 --format='%an' HEAD)
          COMMIT_EMAIL=$(git log -1 --format='%ae' HEAD)
          COMMIT_TIME=$(git log -1 --format='%aI' HEAD)
          jq -n \
             --arg sha "$COMMIT_SHA" \
             --arg msg "$COMMIT_MSG" \
             --arg author "$COMMIT_AUTHOR" \
             --arg email "$COMMIT_EMAIL" \
             --arg time "$COMMIT_TIME" \
             --arg repo_url "https://github.com/Dtronix/Quarry" \
             '{
               "ref": "refs/heads/master",
               "head_commit": {
                 "id": $sha,
                 "tree_id": $sha,
                 "distinct": true,
                 "message": $msg,
                 "timestamp": $time,
                 "url": ($repo_url + "/commit/" + $sha),
                 "author": {"name": $author, "email": $email, "username": $author},
                 "committer": {"name": $author, "email": $email, "username": $author},
                 "added": [], "removed": [], "modified": []
               },
               "repository": {
                 "html_url": $repo_url,
                 "full_name": "Dtronix/Quarry",
                 "name": "Quarry"
               }
             }' > /tmp/synthetic-push-event.json
          echo "=== Synthetic event ==="
          cat /tmp/synthetic-push-event.json
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Process results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Quarry Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: BenchmarkDotNet.Artifacts/combined-results.json
          external-data-json-path: benchmark-store/dev/bench/data.js
          alert-threshold: '120%'
        env:
          GITHUB_EVENT_NAME: push
          GITHUB_EVENT_PATH: /tmp/synthetic-push-event.json

      - name: Push results
        if: inputs.dry_run != 'true'
        run: |
          cd benchmark-store
          git config user.name "github-action-benchmark"
          git config user.email "github@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          COMMIT_SHA="${WORKFLOW_RUN_SHA:-$GITHUB_SHA}"
          git commit -m "Benchmark results for ${COMMIT_SHA::8}"
          git push origin gh-pages
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
