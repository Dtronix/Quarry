name: Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run BDN dry job (single execution, no warmup) for pipeline testing'
        type: boolean
        default: true

concurrency:
  group: benchmark
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: debian-benchmark
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run benchmarks
        run: |
          dotnet run --project src/Quarry.Benchmarks -c Release \
            -- --filter '*' --artifacts BenchmarkDotNet.Artifacts
        env:
          BENCHMARK_DRY_RUN: ${{ inputs.dry_run || 'false' }}

      - name: Merge benchmark results
        run: |
          jq -s '{
            Title: "Quarry Benchmarks",
            HostEnvironmentInfo: .[0].HostEnvironmentInfo,
            Benchmarks: [.[].Benchmarks[] | select(.Statistics != null)]
          }' BenchmarkDotNet.Artifacts/results/*-report-full.json \
            > BenchmarkDotNet.Artifacts/combined-results.json

      - name: Ensure gh-pages branch exists
        run: |
          TMP_DIR=$(mktemp -d)
          cd "$TMP_DIR"
          git clone "https://x-access-token:${TOKEN}@github.com/Dtronix/Quarry-benchmarks.git" repo
          cd repo
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists"
          else
            echo "Creating gh-pages branch"
            git config user.name "github-action-benchmark"
            git config user.email "github@users.noreply.github.com"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo "# Quarry Benchmarks" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
            git push origin gh-pages
          fi
          cd /
          rm -rf "$TMP_DIR"
        env:
          TOKEN: ${{ secrets.BENCHMARK_TOKEN }}

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Quarry Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: BenchmarkDotNet.Artifacts/combined-results.json
          gh-repository: github.com/Dtronix/Quarry-benchmarks
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          github-token: ${{ secrets.BENCHMARK_TOKEN }}
          auto-push: ${{ inputs.dry_run != true }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          max-items-in-chart: 500
          alert-threshold: '120%'
          comment-on-alert: false
